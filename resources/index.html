<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folder Tree by Aimaan Ayaz</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Folder Tree</h1>

<div id="container">
    <label for="path">Enter Folder Path:</label>
    <input type="text" id="path" placeholder="C:\folder">
    <button id="loadBtn">Show Tree</button>
</div>

<div id="layout">
    <div id="tree"></div>
    <div id="info">
        <h3>Folder Info</h3>
        <div id="folderInfo">Select a folder</div>
    </div>
</div>

<script src="/js/neutralino.js"></script>
<script src="/js/main.js"></script>

</body>
</html>
